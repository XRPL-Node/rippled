# Standalone xrpld configuration with OpenTelemetry enabled.
#
# Usage:
#   1. Start the observability stack:
#        docker compose -f docker/telemetry/docker-compose.yml up -d
#   2. Run xrpld in standalone mode:
#        ./xrpld --conf docker/telemetry/xrpld-telemetry.cfg -a --start
#   3. Send RPC commands to exercise tracing:
#        curl -s http://localhost:5005 -d '{"method":"server_info"}'
#   4. View traces in Jaeger UI: http://localhost:16686

[server]
port_rpc_admin_local
port_ws_admin_local

[port_rpc_admin_local]
port = 5005
ip = 127.0.0.1
admin = 127.0.0.1
protocol = http

[port_ws_admin_local]
port = 6006
ip = 127.0.0.1
admin = 127.0.0.1
protocol = ws

[node_db]
type=NuDB
path=./data/nudb
online_delete=256
advisory_delete=0

[database_path]
./data

[debug_logfile]
./data/debug.log

[rpc_startup]
{ "command": "log_level", "severity": "debug" }

[ssl_verify]
0

# --- OpenTelemetry tracing ---
[telemetry]
enabled=1
endpoint=http://localhost:4318/v1/traces
exporter=otlp_http
sampling_ratio=1.0
batch_size=512
batch_delay_ms=5000
max_queue_size=2048
trace_rpc=1
trace_transactions=1
trace_consensus=1
trace_peer=0
trace_ledger=1
